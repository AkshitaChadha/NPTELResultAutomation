<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.alert {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 6px;
    font-weight: 500;
    text-align: center;
}

.alert-danger {
    background-color: #fdecea;
    color: #c0392b;
    border: 1px solid #c0392b;
}

.login-header{
    background:white;
    border-bottom:1px solid #e5e7eb;
    padding:10px 0;
}

.login-header-inner{
    width:95%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.login-logo{
    height:120px;
}

.login-title{
    text-align:right;
}

.login-title h1{
    margin:0;
    font-size:48px;
    font-weight:700;
    color:#2563eb;
    text-align:center;
  
}

.login-title p{
    margin:0;
    font-size:18px;
    color:#6b7280;
}

.top-nav{
    background:#0d6efd;
    padding:16px 50px;
}

.top-nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
}

.page-title{
    font-size:32px;
}

.primary-btn{
    width:100%;
    padding:10px 15px;
    font-size:18px;
    background:#0d6efd;
}
</style>

</head>
<body>

<div class="login-header">
    <div class="login-header-inner">

        <img src="{{ url_for('static', filename='agc_logo.png') }}" class="login-logo">

        <div class="login-title">
            <h1>NPTEL</h1>
            <p>Result Automation System</p>
        </div>

    </div>
</div>

<div class="top-nav">
    <a href="/login">Home</a>
</div>



<div class="page-wrapper container" style="max-width:500px; margin-top:60px;">

<h2 class="page-title" style="text-align:center;">Login</h2>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST" style="margin-top:30px;">

<input name="email"
id="email"
placeholder="Enter Email"
required
value="{{ email }}"
class="big-input">

<br>

<input name="password"
type="password"
placeholder="Enter Password"
required
class="big-input">

<br>

<select name="role" id="roleSelect" class="big-input" required>
<option value="" disabled selected>Select your role</option>
</select>

<br>

<select name="session_label" class="big-input" required>

{% for s in all_sessions %}
<option value="{{ s }}" {% if s == current_session %}selected{% endif %}>
{{ s }}
</option>
{% endfor %}

</select>

<br>

<button class="primary-btn">
Login
</button>

</form>

</div>


<script>

function loadRoles(email, selectedRole=null){

if (!email) return;

fetch("/check_roles?email=" + email)
.then(response => response.json())
.then(data => {

let select = document.getElementById("roleSelect");
select.innerHTML = "";

let roles = data.roles || [];

if(roles.length > 1){

let placeholder = document.createElement("option");
placeholder.text = "Select your role";
placeholder.disabled = true;
placeholder.selected = true;
placeholder.value = "";
select.appendChild(placeholder);

}

roles.forEach(role => {

let option = document.createElement("option");

if(role === "TEACHER"){
option.value = "TEACHER";
option.text = "Teacher";
}

if(role === "ADMIN"){
option.value = "ADMIN";
option.text = "Admin";
}

if(role === "HOD"){
option.value = "ADMIN";
option.text = "Super Admin";
}

select.appendChild(option);

});

if(roles.length === 1){
select.value = select.options[0].value;
}

if(selectedRole){
select.value = selectedRole;
}

});

}

document.getElementById("email").addEventListener("blur", function(){
loadRoles(this.value);
});

window.onload = function(){

let existingEmail = "{{ email }}";
let previousRole = "{{ selected_role }}";

if(existingEmail){
loadRoles(existingEmail, previousRole);
}

};

</script>

</body>
</html>
